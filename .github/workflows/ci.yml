name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
      STRIPE_PRODUCT_ID: ${{ secrets.STRIPE_PRODUCT_ID }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      RLHF_API_KEY: ${{ secrets.RLHF_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            workers/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install worker deps
        run: npm --prefix workers ci

      - name: Run tests
        run: npm test

      - name: Run worker checks
        run: npm run test:workers

      - name: Run adapter proof
        run: npm run prove:adapters

      - name: Run automation proof
        run: npm run prove:automation

      - name: Run workflow contract proof
        run: npm run prove:workflow-contract

      - name: Run autoresearch proof
        run: npm run prove:autoresearch

      - name: Upload proof artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: proof-artifacts
          path: |
            proof/compatibility/report.json
            proof/compatibility/report.md
            proof/automation/report.json
            proof/automation/report.md
            proof/workflow-contract/report.json
            proof/workflow-contract/report.md
            proof/autoresearch-report.json
            proof/autoresearch-report.md

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RLHF_API_KEY: ${{ secrets.RLHF_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
      RAILWAY_HEALTHCHECK_URL: ${{ vars.RAILWAY_HEALTHCHECK_URL }}
      RLHF_PUBLIC_APP_ORIGIN: ${{ vars.RLHF_PUBLIC_APP_ORIGIN }}
      RLHF_BILLING_API_BASE_URL: ${{ vars.RLHF_BILLING_API_BASE_URL }}
      RAILWAY_TOKEN_ROTATED_AT: ${{ vars.RAILWAY_TOKEN_ROTATED_AT }}
      RLHF_API_KEY_ROTATED_AT: ${{ vars.RLHF_API_KEY_ROTATED_AT }}
      STRIPE_SECRET_KEY_ROTATED_AT: ${{ vars.STRIPE_SECRET_KEY_ROTATED_AT }}
      STRIPE_WEBHOOK_SECRET_ROTATED_AT: ${{ vars.STRIPE_WEBHOOK_SECRET_ROTATED_AT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Railway deployment configuration
        id: railway-config
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ] || [ -z "$RAILWAY_ENVIRONMENT_ID" ] || [ -z "$RAILWAY_HEALTHCHECK_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Railway deploy skipped: missing RAILWAY_TOKEN, RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT_ID, or RAILWAY_HEALTHCHECK_URL."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Enforce deploy policy
        if: steps.railway-config.outputs.enabled == 'true'
        run: node scripts/deploy-policy.js --profiles=runtime,billing,deploy

      - name: Install Railway CLI
        if: steps.railway-config.outputs.enabled == 'true'
        run: npm install -g @railway/cli@3

      - name: Deploy to Railway
        id: railway-deploy
        if: steps.railway-config.outputs.enabled == 'true'
        run: |
          SERVICE_ARGS=()
          if [ -n "$RAILWAY_SERVICE" ]; then
            SERVICE_ARGS+=(--service "$RAILWAY_SERVICE")
          fi

          set +e
          railway up \
            --ci \
            --detach \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT_ID" \
            "${SERVICE_ARGS[@]}"
          DEPLOY_EXIT_CODE=$?
          echo "exit_code=$DEPLOY_EXIT_CODE" >> "$GITHUB_OUTPUT"
          if [ "$DEPLOY_EXIT_CODE" -ne 0 ]; then
            echo "::warning::Railway deploy failed with exit code $DEPLOY_EXIT_CODE. Continuing to production health verification."
          fi
          exit 0

      - name: Verify deployment health
        if: steps.railway-config.outputs.enabled == 'true'
        env:
          DEPLOY_EXIT_CODE: ${{ steps.railway-deploy.outputs.exit_code }}
        run: |
          DEPLOY_EXIT_CODE="${DEPLOY_EXIT_CODE:-0}"
          echo "Waiting 30s for deploy to stabilise..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RAILWAY_HEALTHCHECK_URL")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            if [ "$DEPLOY_EXIT_CODE" != "0" ]; then
              echo "Railway deploy also exited with $DEPLOY_EXIT_CODE."
            fi
            exit 1
          fi
          if [ "$DEPLOY_EXIT_CODE" != "0" ]; then
            echo "Deployment command exited $DEPLOY_EXIT_CODE, but production is still healthy."
          else
            echo "Deployment verified healthy."
          fi
