name: Deploy to Railway

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RLHF_API_KEY: ${{ secrets.RLHF_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
      RAILWAY_HEALTHCHECK_URL: ${{ vars.RAILWAY_HEALTHCHECK_URL }}
      RLHF_PUBLIC_APP_ORIGIN: ${{ vars.RLHF_PUBLIC_APP_ORIGIN }}
      RLHF_BILLING_API_BASE_URL: ${{ vars.RLHF_BILLING_API_BASE_URL }}
      RLHF_FEEDBACK_DIR: ${{ vars.RLHF_FEEDBACK_DIR }}
      RLHF_GA_MEASUREMENT_ID: ${{ vars.RLHF_GA_MEASUREMENT_ID }}
      RLHF_GOOGLE_SITE_VERIFICATION: ${{ vars.RLHF_GOOGLE_SITE_VERIFICATION }}
      RAILWAY_TOKEN_ROTATED_AT: ${{ vars.RAILWAY_TOKEN_ROTATED_AT }}
      RLHF_API_KEY_ROTATED_AT: ${{ vars.RLHF_API_KEY_ROTATED_AT }}
      STRIPE_SECRET_KEY_ROTATED_AT: ${{ vars.STRIPE_SECRET_KEY_ROTATED_AT }}
      STRIPE_WEBHOOK_SECRET_ROTATED_AT: ${{ vars.STRIPE_WEBHOOK_SECRET_ROTATED_AT }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Check Railway deployment configuration
        id: railway-config
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_PROJECT_ID" ] || [ -z "$RAILWAY_ENVIRONMENT_ID" ] || [ -z "$RAILWAY_HEALTHCHECK_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Railway deploy skipped: missing RAILWAY_TOKEN, RAILWAY_PROJECT_ID, RAILWAY_ENVIRONMENT_ID, or RAILWAY_HEALTHCHECK_URL."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - name: Enforce deploy policy
        if: steps.railway-config.outputs.enabled == 'true'
        run: node scripts/deploy-policy.js --profiles=runtime,billing,deploy
      - name: Stamp immutable build metadata
        if: steps.railway-config.outputs.enabled == 'true'
        run: node scripts/build-metadata.js --sha "$GITHUB_SHA" --output config/build-metadata.json
      - name: Install Railway CLI
        if: steps.railway-config.outputs.enabled == 'true'
        run: npm install -g @railway/cli
      - name: Set Railway environment variables
        if: steps.railway-config.outputs.enabled == 'true'
        run: |
          SERVICE_ARGS=()
          if [ -n "$RAILWAY_SERVICE" ]; then
            SERVICE_ARGS+=(--service "$RAILWAY_SERVICE")
          fi
          railway variables set STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" "${SERVICE_ARGS[@]}"
          railway variables set STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" "${SERVICE_ARGS[@]}"
          if [ -n "$RLHF_FEEDBACK_DIR" ]; then
            railway variables set RLHF_FEEDBACK_DIR="$RLHF_FEEDBACK_DIR" "${SERVICE_ARGS[@]}"
          fi
          if [ -n "$RLHF_GA_MEASUREMENT_ID" ]; then
            railway variables set RLHF_GA_MEASUREMENT_ID="$RLHF_GA_MEASUREMENT_ID" "${SERVICE_ARGS[@]}"
          fi
          if [ -n "$RLHF_GOOGLE_SITE_VERIFICATION" ]; then
            railway variables set RLHF_GOOGLE_SITE_VERIFICATION="$RLHF_GOOGLE_SITE_VERIFICATION" "${SERVICE_ARGS[@]}"
          fi
      - name: Deploy to Railway
        if: steps.railway-config.outputs.enabled == 'true'
        run: |
          SERVICE_ARGS=()
          if [ -n "$RAILWAY_SERVICE" ]; then
            SERVICE_ARGS+=(--service "$RAILWAY_SERVICE")
          fi
          railway up --ci --detach --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT_ID" "${SERVICE_ARGS[@]}"
      - name: Verify deployment health
        if: steps.railway-config.outputs.enabled == 'true'
        run: |
          MAX_ATTEMPTS=8
          SLEEP_SECONDS=10
          STATUS=""
          RESPONSE_FILE="$(mktemp)"
          LIVE_SHA=""

          echo "Waiting for deploy to stabilise with up to $MAX_ATTEMPTS health checks and build SHA verification..."
          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" "$RAILWAY_HEALTHCHECK_URL" || true)
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS: $STATUS"
            if [ "$STATUS" = "200" ]; then
              LIVE_SHA=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(data.buildSha || ''));" "$RESPONSE_FILE" || true)
              echo "Observed build SHA: ${LIVE_SHA:-<missing>}"
              if [ "$LIVE_SHA" = "$GITHUB_SHA" ]; then
                break
              fi
            fi
            if [ -s "$RESPONSE_FILE" ]; then
              echo "Health response body:"
              sed -n '1,20p' "$RESPONSE_FILE"
            fi
            if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
              sleep "$SLEEP_SECONDS"
            fi
          done

          if [ "$STATUS" != "200" ] || [ "$LIVE_SHA" != "$GITHUB_SHA" ]; then
            echo "Deployment verification failed after $MAX_ATTEMPTS attempts"
            echo "Final health status: $STATUS"
            echo "Expected build SHA: $GITHUB_SHA"
            echo "Observed build SHA: ${LIVE_SHA:-<missing>}"
            exit 1
          fi
