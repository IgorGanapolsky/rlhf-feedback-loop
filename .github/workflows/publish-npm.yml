name: Publish to NPM

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'server.json'
      - '.github/workflows/publish-npm.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: node scripts/sync-version.js --check
      - run: npm test
      - name: Resolve package version
        id: package
        run: |
          version=$(node -e 'process.stdout.write(require("./package.json").version)')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check whether version is already on npm
        id: npm
        run: |
          if npm view "mcp-memory-gateway@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Inspect release tag provenance
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: tag
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/v${VERSION}" | awk '{print $1}')"

          if [ -n "$remote_tag_sha" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "sha=$remote_tag_sha" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Plan publish action
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: plan
        env:
          VERSION: ${{ steps.package.outputs.version }}
          CURRENT_SHA: ${{ github.sha }}
          NPM_PUBLISHED: ${{ steps.npm.outputs.published }}
          TAG_EXISTS: ${{ steps.tag.outputs.exists }}
          TAG_SHA: ${{ steps.tag.outputs.sha }}
        run: node scripts/publish-decision.js
      - name: Report publish no-op
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.skip_publish == 'true'
        run: echo "${{ steps.plan.outputs.reason }}"
      - name: Create release tag
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.create_tag == 'true'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
      - name: Publish npm package
        if: ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.publish_npm == 'true') || (github.event_name == 'release' && steps.npm.outputs.published == 'false')
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Ensure GitHub Release exists
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.plan.outputs.ensure_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if ! gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
          fi
