name: Publish to NPM

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'server.json'
      - '.github/workflows/publish-npm.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: node scripts/sync-version.js --check
      - run: npm test
      - name: Resolve package version
        id: package
        run: |
          version=$(node -e 'process.stdout.write(require("./package.json").version)')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check whether version is already on npm
        id: npm
        run: |
          if npm view "mcp-memory-gateway@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Inspect release tag provenance
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        id: tag
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/v${VERSION}" | awk '{print $1}')"

          if [ -n "$remote_tag_sha" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "sha=$remote_tag_sha" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Reject ambiguous published version without a release tag
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.npm.outputs.published == 'true' && steps.tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          echo "Version ${VERSION} is already published on npm but has no remote tag. Refusing to guess a source commit for the release. Recover from the original release commit or bump the version." >&2
          exit 1
      - name: Verify existing release tag matches the current commit
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.tag.outputs.exists == 'true'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if [ "${{ steps.tag.outputs.sha }}" != "$GITHUB_SHA" ]; then
            echo "Tag v${VERSION} already exists at ${{ steps.tag.outputs.sha }}, not ${GITHUB_SHA}. Refusing to publish or create a release for a different commit with the same version." >&2
            exit 1
          fi
      - name: Create release tag
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && steps.npm.outputs.published == 'false' && steps.tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
      - name: Publish npm package
        if: steps.npm.outputs.published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Ensure GitHub Release exists
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if ! gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
          fi
