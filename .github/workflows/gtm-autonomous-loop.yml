name: Always-On GTM Acquisition Loop

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acquisition:
    runs-on: ubuntu-latest
    env:
      GTM_ARTIFACT_DIR: .artifacts/gtm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Prepare artifact directory
        run: mkdir -p "$GTM_ARTIFACT_DIR"
      - name: Run Prospecting & Personalization Agent
        run: node scripts/autonomous-sales-agent.js --report-dir "$GTM_ARTIFACT_DIR" --max-targets 8
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run X.com Premium+ Marketing Loop
        run: node scripts/x-autonomous-marketing.js --report-dir "$GTM_ARTIFACT_DIR"
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      - name: Upload GTM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gtm-revenue-loop
          path: .artifacts/gtm/
      - name: Post Launch Thread to X.com
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/post-to-x.js --thread
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
