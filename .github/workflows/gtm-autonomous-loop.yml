name: Always-On GTM Acquisition Loop

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  acquisition:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run Prospecting & Personalization Agent
        run: node scripts/autonomous-sales-agent.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run X.com Premium+ Marketing Loop
        run: node scripts/x-autonomous-marketing.js
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      - name: Post Launch Thread to X.com
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/post-to-x.js --thread
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      - name: Create Pull Request for Leads
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: hourly leads and marketing dispatch"
          title: "🤖 GTM: Hourly Prospecting Report"
          body: "Autonomous GTM agent has generated new leads and marketing reports."
          branch: "gtm/hourly-leads"
          base: "main"
          delete-branch: true
