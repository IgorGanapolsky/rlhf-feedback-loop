name: Self-Healing Auto-Fix

on:
  schedule:
    - cron: '30 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install

      - name: Run self-heal
        run: node scripts/self-heal.js --reason=scheduled-auto-fix > self_heal_report.json || true

      - name: Open remediation PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No auto-fix changes."
            exit 0
          fi

          BRANCH="auto/self-heal-fix-${{ github.run_id }}-${{ github.run_attempt }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(auto): scheduled self-healing remediation" || true
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "fix(auto): scheduled self-healing remediation" \
            --body "Automated self-healing remediation PR generated by workflow." \
            --label self-healing || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-healing-auto-fix-report
          path: self_heal_report.json
          retention-days: 14
