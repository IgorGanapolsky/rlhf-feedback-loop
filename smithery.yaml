startCommand:
  type: "stdio"
  configSchema:
    type: "object"
    properties:
      mcpProfile:
        type: "string"
        description: "MCP profile to use (default, readonly, locked)"
        default: "default"
    required: []
  commandFunction:
    command: "npx"
    args:
      - "-y"
      - "mcp-memory-gateway"
      - "serve"
