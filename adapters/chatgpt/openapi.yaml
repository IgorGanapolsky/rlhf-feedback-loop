openapi: 3.1.0
info:
  title: MCP Memory Gateway API
  version: 1.2.0
  description: |
    Production API for feedback capture, schema-validated memory promotion,
    prevention rule generation, and DPO export.
    Bare up/down signals are logged immediately, but the API returns
    clarification_required until one sentence explains what worked or failed.
servers:
  - url: https://rlhf-feedback-loop-production.up.railway.app
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
  schemas:
    RubricScore:
      type: object
      required: [criterion, score]
      properties:
        criterion:
          type: string
        score:
          type: number
          minimum: 1
          maximum: 5
        evidence:
          type: string
        judge:
          type: string
    CaptureFeedbackRequest:
      type: object
      required: [signal]
      properties:
        signal:
          type: string
          enum: [up, down, positive, negative]
        context:
          type: string
          description: One-sentence reason describing what worked or failed
        whatWentWrong:
          type: string
        whatToChange:
          type: string
        whatWorked:
          type: string
        rubricScores:
          type: array
          items:
            $ref: '#/components/schemas/RubricScore'
        guardrails:
          type: object
          properties:
            testsPassed:
              type: boolean
            pathSafety:
              type: boolean
            budgetCompliant:
              type: boolean
        tags:
          oneOf:
            - type: array
              items:
                type: string
            - type: string
        skill:
          type: string
    IntentPlanRequest:
      type: object
      required: [intentId]
      properties:
        intentId:
          type: string
        context:
          type: string
        mcpProfile:
          type: string
        bundleId:
          type: string
        partnerProfile:
          type: string
        approved:
          type: boolean
    BillingCheckoutRequest:
      type: object
      properties:
        successUrl:
          type: string
          format: uri
        cancelUrl:
          type: string
          format: uri
        customerEmail:
          type: string
          format: email
        installId:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
    BillingProvisionRequest:
      type: object
      required: [customerId]
      properties:
        customerId:
          type: string
        installId:
          type: string
    FunnelAnalyticsResponse:
      type: object
      properties:
        totalEvents:
          type: integer
        stageCounts:
          type: object
          properties:
            acquisition:
              type: integer
            activation:
              type: integer
            paid:
              type: integer
        eventCounts:
          type: object
          additionalProperties:
            type: integer
        conversionRates:
          type: object
          properties:
            acquisitionToActivation:
              type: number
            activationToPaid:
              type: number
            acquisitionToPaid:
              type: number
    BillingSummaryResponse:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        coverage:
          type: object
          properties:
            source:
              type: string
            tracksBookedRevenue:
              type: boolean
            tracksPaidOrders:
              type: boolean
            tracksInvoices:
              type: boolean
            tracksAttribution:
              type: boolean
            providerCoverage:
              type: object
              additionalProperties:
                type: string
        funnel:
          allOf:
            - $ref: '#/components/schemas/FunnelAnalyticsResponse'
            - type: object
              properties:
                uniqueAcquisitionLeads:
                  type: integer
                uniquePaidCustomers:
                  type: integer
                firstPaidAt:
                  type: string
                  nullable: true
                lastPaidAt:
                  type: string
                  nullable: true
                lastPaidEvent:
                  type: object
                  nullable: true
                  properties:
                    timestamp:
                      type: string
                      nullable: true
                    event:
                      type: string
                      nullable: true
                    evidence:
                      type: string
                      nullable: true
                    customerId:
                      type: string
                      nullable: true
                    traceId:
                      type: string
                      nullable: true
        signups:
          type: object
          properties:
            total:
              type: integer
            uniqueLeads:
              type: integer
            bySource:
              type: object
              additionalProperties:
                type: integer
            byCampaign:
              type: object
              additionalProperties:
                type: integer
        revenue:
          type: object
          properties:
            paidOrders:
              type: integer
            paidCustomers:
              type: integer
            bookedRevenueCents:
              type: integer
            bookedRevenueByCurrency:
              type: object
              additionalProperties:
                type: integer
            amountKnownOrders:
              type: integer
            amountUnknownOrders:
              type: integer
            amountKnownCoverageRate:
              type: number
            unreconciledPaidEvents:
              type: integer
            latestPaidAt:
              type: string
              nullable: true
            latestPaidOrder:
              type: object
              nullable: true
              properties:
                timestamp:
                  type: string
                  nullable: true
                provider:
                  type: string
                  nullable: true
                event:
                  type: string
                  nullable: true
                orderId:
                  type: string
                  nullable: true
                customerId:
                  type: string
                  nullable: true
                amountCents:
                  type: integer
                  nullable: true
                currency:
                  type: string
                  nullable: true
                amountKnown:
                  type: boolean
            byProvider:
              type: object
              additionalProperties:
                type: object
                properties:
                  paidOrders:
                    type: integer
                  bookedRevenueCents:
                    type: integer
                  amountKnownOrders:
                    type: integer
                  amountUnknownOrders:
                    type: integer
                  bookedRevenueByCurrency:
                    type: object
                    additionalProperties:
                      type: integer
        attribution:
          type: object
          properties:
            acquisitionBySource:
              type: object
              additionalProperties:
                type: integer
            acquisitionByCampaign:
              type: object
              additionalProperties:
                type: integer
            paidBySource:
              type: object
              additionalProperties:
                type: integer
            paidByCampaign:
              type: object
              additionalProperties:
                type: integer
            bookedRevenueBySourceCents:
              type: object
              additionalProperties:
                type: integer
            bookedRevenueByCampaignCents:
              type: object
              additionalProperties:
                type: integer
            conversionBySource:
              type: object
              additionalProperties:
                type: number
            conversionByCampaign:
              type: object
              additionalProperties:
                type: number
        keys:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            disabled:
              type: integer
            activeCustomers:
              type: integer
            totalUsage:
              type: integer
            bySource:
              type: object
              additionalProperties:
                type: integer
            activeBySource:
              type: object
              additionalProperties:
                type: integer
        customers:
          type: array
          items:
            type: object
            properties:
              customerId:
                type: string
              activeKeys:
                type: integer
              totalKeys:
                type: integer
              usageCount:
                type: integer
              source:
                type: string
              installId:
                type: string
                nullable: true
              createdAt:
                type: string
                nullable: true
              disabledAt:
                type: string
                nullable: true
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        '200':
          description: Service health
        '401':
          description: Unauthorized
  /v1/feedback/capture:
    post:
      operationId: captureFeedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureFeedbackRequest'
      responses:
        '200':
          description: Feedback accepted and promoted to memory
        '422':
          description: Feedback logged only; clarification required or promotion rejected
        '401':
          description: Unauthorized
  /v1/feedback/stats:
    get:
      operationId: getFeedbackStats
      responses:
        '200':
          description: Aggregated feedback statistics
        '401':
          description: Unauthorized
  /v1/analytics/funnel:
    get:
      operationId: getFunnelAnalytics
      responses:
        '200':
          description: Acquisition/activation/paid funnel metrics from append-only ledger
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunnelAnalyticsResponse'
        '401':
          description: Unauthorized
  /v1/billing/summary:
    get:
      operationId: getBillingSummary
      responses:
        '200':
          description: Admin-only business summary from the funnel ledger, revenue ledger, and key store
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSummaryResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /v1/intents/catalog:
    get:
      operationId: listIntentCatalog
      parameters:
        - in: query
          name: mcpProfile
          schema:
            type: string
        - in: query
          name: bundleId
          schema:
            type: string
        - in: query
          name: partnerProfile
          schema:
            type: string
      responses:
        '200':
          description: Intent catalog with risk and checkpoint metadata
        '401':
          description: Unauthorized
  /v1/intents/plan:
    post:
      operationId: planIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntentPlanRequest'
      responses:
        '200':
          description: Policy-scoped intent execution plan
        '400':
          description: Invalid intent request
        '401':
          description: Unauthorized
  /v1/feedback/summary:
    get:
      operationId: getFeedbackSummary
      parameters:
        - in: query
          name: recent
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Feedback summary text
        '401':
          description: Unauthorized
  /v1/feedback/rules:
    post:
      operationId: generatePreventionRules
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                minOccurrences:
                  type: integer
                  default: 2
                outputPath:
                  type: string
      responses:
        '200':
          description: Prevention rules generated
        '401':
          description: Unauthorized
  /v1/dpo/export:
    post:
      operationId: exportDpoPairs
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                inputPath:
                  type: string
                memoryLogPath:
                  type: string
                outputPath:
                  type: string
      responses:
        '200':
          description: DPO export completed
        '401':
          description: Unauthorized
  /v1/context/construct:
    post:
      operationId: constructContextPack
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                maxItems:
                  type: integer
                  default: 8
                maxChars:
                  type: integer
                  default: 6000
                namespaces:
                  type: array
                  items:
                    type: string
                    enum:
                      - raw_history
                      - memory/error
                      - memory/learning
                      - rules
                      - tools
                      - provenance
      responses:
        '200':
          description: Context pack created
        '400':
          description: Invalid namespace selection
        '401':
          description: Unauthorized
  /v1/context/evaluate:
    post:
      operationId: evaluateContextPack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [packId, outcome]
              properties:
                packId:
                  type: string
                outcome:
                  type: string
                signal:
                  type: string
                notes:
                  type: string
                rubricScores:
                  type: array
                  items:
                    $ref: '#/components/schemas/RubricScore'
                guardrails:
                  type: object
                  properties:
                    testsPassed:
                      type: boolean
                    pathSafety:
                      type: boolean
                    budgetCompliant:
                      type: boolean
      responses:
        '200':
          description: Evaluation recorded
        '400':
          description: Invalid rubric payload
        '401':
          description: Unauthorized
  /v1/context/provenance:
    get:
      operationId: getContextProvenance
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Recent provenance events
        '401':
          description: Unauthorized
  /v1/billing/checkout:
    post:
      operationId: createBillingCheckoutSession
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingCheckoutRequest'
      responses:
        '200':
          description: Stripe checkout session created
  /v1/billing/usage:
    get:
      operationId: getBillingUsage
      responses:
        '200':
          description: Usage count for authenticated billing key
        '401':
          description: Unauthorized
  /v1/billing/provision:
    post:
      operationId: provisionBillingKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingProvisionRequest'
      responses:
        '200':
          description: API key provisioned
        '400':
          description: Missing required customerId
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - requires static RLHF_API_KEY admin token
  /v1/billing/webhook:
    post:
      operationId: stripeBillingWebhook
      security: []
      responses:
        '200':
          description: Webhook accepted
        '400':
          description: Invalid webhook signature or payload
  /v1/billing/github-webhook:
    post:
      operationId: githubMarketplaceWebhook
      security: []
      responses:
        '200':
          description: Webhook accepted
        '400':
          description: Invalid webhook signature or payload
